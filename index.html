<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕉️ Harivanshi Sadhna Bhakti</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Tiro+Devanagari+Sanskrit&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B00;
    --deep-saffron: #E85D00;
    --gold: #FFB300;
    --gold-light: #FFD54F;
    --cream: #FFF8E7;
    --deep-maroon: #3E0000;
    --maroon: #6B1A1A;
    --dark-bg: #1A0A00;
    --card-bg: rgba(255,248,231,0.06);
    --border: rgba(255,179,0,0.25);
    --text-light: #FFF3D0;
    --text-muted: rgba(255,243,208,0.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Crimson Pro', serif;
    background: var(--dark-bg);
    color: var(--text-light);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,107,0,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,179,0,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(107,26,26,0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .page { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .page.active { display: block; }
  nav {
    background: rgba(26,10,0,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .nav-brand {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 1px;
    line-height: 1.3;
  }
  .nav-brand span { display: block; font-size: 9px; color: var(--saffron); letter-spacing: 3px; }
  .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-light);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-btn:hover, .nav-btn.active-link { background: var(--saffron); border-color: var(--saffron); color: white; }
  .nav-btn.gold {
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    border: none;
    color: var(--dark-bg);
    font-weight: 600;
  }
  .hero { text-align: center; padding: 80px 20px 60px; position: relative; }
  .om-symbol {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 20px;
    animation: float 4s ease-in-out infinite;
    display: block;
    filter: drop-shadow(0 0 30px rgba(255,179,0,0.5));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .hero h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(20px, 5vw, 38px);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255,179,0,0.4);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .hero p { color: var(--text-muted); font-size: 17px; font-style: italic; margin-bottom: 40px; }
  .hero-btns { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--deep-saffron));
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 30px;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,0,0.5); }
  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 14px 32px;
    border-radius: 30px;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .btn-secondary:hover { background: rgba(255,179,0,0.1); }
  .features {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .feature-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .feature-card:hover { transform: translateY(-4px); border-color: var(--gold); background: rgba(255,248,231,0.1); }
  .feature-card .icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .feature-card h3 { font-family: 'Cinzel Decorative', cursive; font-size: 12px; color: var(--gold); margin-bottom: 8px; }
  .feature-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .divider { text-align: center; padding: 20px; color: var(--saffron); font-size: 24px; letter-spacing: 15px; opacity: 0.4; }
  .auth-container { max-width: 420px; margin: 60px auto; padding: 20px; }

  .form-group { margin-bottom: 18px; }

  .form-group input, .form-group textarea, .form-group select {

    font-size: 15px;

  .form-group select option { background: #2a1000; color: var(--text-light); }
  .btn-full {
    width: 100%;

    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .btn-full:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,0,0.4); }
  .btn-full:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
  .auth-switch a { color: var(--saffron); cursor: pointer; text-decoration: underline; }
  .error-msg { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff8a80; margin-bottom: 16px; display: none; }
  .success-msg { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #69f0ae; margin-bottom: 16px; display: none; }
  .dashboard-header { background: linear-gradient(135deg, rgba(255,107,0,0.15), rgba(255,179,0,0.1)); border-bottom: 1px solid var(--border); padding: 30px 20px; text-align: center; }
  .dashboard-header h2 { font-family: 'Cinzel Decorative', cursive; font-size: 16px; color: var(--gold); margin-bottom: 4px; }
  .dashboard-header p { color: var(--text-muted); font-size: 15px; font-style: italic; }
  .streak-display { display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
  .streak-item { text-align: center; background: rgba(255,179,0,0.08); border: 1px solid var(--border); border-radius: 16px; padding: 16px 24px; }
  .streak-item .number { font-family: 'Cinzel Decorative', cursive; font-size: 32px; color: var(--gold); display: block; }
  .streak-item .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .dashboard-content { max-width: 900px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .dashboard-content { grid-template-columns: 1fr; } }
  .dash-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); }
  .dash-card h3 { font-family: 'Cinzel Decorative', cursive; font-size: 12px; color: var(--gold); margin-bottom: 16px; letter-spacing: 1px; }
  .sadhna-page { max-width: 600px; margin: 0 auto; padding: 30px 20px; }
  .sadhna-page h2 { font-family: 'Cinzel Decorative', cursive; font-size: 18px; color: var(--gold); text-align: center; margin-bottom: 6px; }
  .sadhna-page .subtitle { text-align: center; color: var(--text-muted); font-style: italic; margin-bottom: 30px; }
  .challenge-checklist { background: rgba(255,107,0,0.08); border: 1px solid rgba(255,107,0,0.3); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .challenge-checklist h3 { font-family: 'Cinzel Decorative', cursive; font-size: 12px; color: var(--saffron); margin-bottom: 16px; letter-spacing: 1px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,107,0,0.15); cursor: pointer; }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--saffron); cursor: pointer; flex-shrink: 0; }
  .check-item label { font-size: 15px; color: var(--text-light); cursor: pointer; line-height: 1.4; }
  .check-item label small { display: block; color: var(--text-muted); font-size: 13px; }
  .mala-counter { display: flex; align-items: center; gap: 15px; justify-content: center; margin: 10px 0; }
  .mala-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: var(--gold); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mala-btn:hover { background: var(--gold); color: var(--dark-bg); }
  .mala-count { font-family: 'Cinzel Decorative', cursive; font-size: 28px; color: var(--gold); min-width: 40px; text-align: center; }
  .mala-target { font-size: 13px; color: var(--text-muted); text-align: center; }
  .community-page { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
  .community-page h2 { font-family: 'Cinzel Decorative', cursive; font-size: 18px; color: var(--gold); text-align: center; margin-bottom: 6px; }
  .community-page .subtitle { text-align: center; color: var(--text-muted); font-style: italic; margin-bottom: 30px; }
  .report-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 16px; backdrop-filter: blur(10px); transition: all 0.3s; animation: fadeInUp 0.4s ease both; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .report-card:hover { border-color: var(--gold); }
  .report-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--saffron), var(--maroon)); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel Decorative', cursive; font-size: 16px; color: white; flex-shrink: 0; border: 2px solid var(--border); }
  .report-meta { flex: 1; }
  .report-meta .bhakt-name { font-family: 'Cinzel Decorative', cursive; font-size: 13px; color: var(--gold); }
  .report-meta .report-date { font-size: 12px; color: var(--text-muted); }
  .streak-badge { background: linear-gradient(135deg, var(--saffron), var(--gold)); color: var(--dark-bg); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; font-family: 'Cinzel Decorative', cursive; white-space: nowrap; }
  .report-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge.completed { background: rgba(0,200,83,0.15); border: 1px solid rgba(0,200,83,0.4); color: #69f0ae; }
  .badge.partial { background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.3); color: var(--gold); }
  .badge.missed { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #ff8a80; }
  .report-extra { background: rgba(255,179,0,0.05); border-left: 3px solid var(--saffron); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 14px; color: var(--text-muted); font-style: italic; line-height: 1.6; margin-top: 10px; }
  .leaderboard-page { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
  .leaderboard-page h2 { font-family: 'Cinzel Decorative', cursive; font-size: 18px; color: var(--gold); text-align: center; margin-bottom: 6px; }
  .leaderboard-page .subtitle { text-align: center; color: var(--text-muted); font-style: italic; margin-bottom: 30px; }
  .leaderboard-item { display: flex; align-items: center; gap: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; transition: all 0.3s; animation: fadeInUp 0.4s ease both; }
  .leaderboard-item:hover { border-color: var(--gold); transform: translateX(4px); }
  .leaderboard-item.top-1 { border-color: #FFD700; background: rgba(255,215,0,0.08); }
  .leaderboard-item.top-2 { border-color: #C0C0C0; background: rgba(192,192,192,0.06); }
  .leaderboard-item.top-3 { border-color: #CD7F32; background: rgba(205,127,50,0.06); }
  .rank { font-family: 'Cinzel Decorative', cursive; font-size: 20px; color: var(--text-muted); min-width: 30px; text-align: center; }
  .rank.gold { color: #FFD700; }
  .rank.silver { color: #C0C0C0; }
  .rank.bronze { color: #CD7F32; }
  .lb-info { flex: 1; }
  .lb-name { font-family: 'Cinzel Decorative', cursive; font-size: 13px; color: var(--text-light); }
  .lb-stats { font-size: 13px; color: var(--text-muted); }
  .lb-streak { text-align: right; font-family: 'Cinzel Decorative', cursive; }
  .lb-streak .days { font-size: 24px; color: var(--gold); display: block; }
  .lb-streak .days-label { font-size: 10px; color: var(--text-muted); }
  .admin-page { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
  .admin-page h2 { font-family: 'Cinzel Decorative', cursive; font-size: 18px; color: var(--saffron); margin-bottom: 24px; text-align: center; }
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 30px; }
  .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; }
  .stat-card .num { font-family: 'Cinzel Decorative', cursive; font-size: 36px; color: var(--gold); display: block; }
  .stat-card .lbl { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .admin-table { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 24px; }
  .admin-table h3 { font-family: 'Cinzel Decorative', cursive; font-size: 12px; color: var(--gold); padding: 16px 20px; border-bottom: 1px solid var(--border); letter-spacing: 1px; }
  .table-row { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(255,179,0,0.08); gap: 14px; font-size: 14px; }
  .table-row:last-child { border-bottom: none; }
  .table-row .tr-name { flex: 1; color: var(--text-light); font-family: 'Cinzel Decorative', cursive; font-size: 12px; }
  .table-row .tr-email { flex: 2; color: var(--text-muted); font-size: 13px; }
  .table-row .tr-streak { color: var(--gold); font-family: 'Cinzel Decorative', cursive; font-size: 14px; }
  .announcement-form { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .announcement-form h3 { font-family: 'Cinzel Decorative', cursive; font-size: 12px; color: var(--gold); margin-bottom: 16px; letter-spacing: 1px; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-style: italic; gap: 12px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--saffron); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, var(--saffron), var(--deep-saffron)); color: white; padding: 14px 28px; border-radius: 30px; font-family: 'Cinzel Decorative', cursive; font-size: 11px; letter-spacing: 1px; z-index: 9999; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: center; max-width: 300px; box-shadow: 0 8px 30px rgba(255,107,0,0.5); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text-muted); font-family: 'Crimson Pro', serif; font-size: 14px; cursor: pointer; transition: all 0.3s; }
  .tab.active { background: var(--saffron); border-color: var(--saffron); color: white; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-style: italic; }
  .milestones { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .milestone-badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); color: var(--text-muted); }

  footer .om { font-size: 24px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<nav id="mainNav" style="display:none">
  <div class="nav-inner">
    <div class="nav-brand">🕉️ Harivanshi<span>SADHNA BHAKTI</span></div>
    <div class="nav-links" id="navLinks">
      <button class="nav-btn" onclick="showPage('community')">🙏 Sangha</button>
      <button class="nav-btn" onclick="showPage('leaderboard')">🏆 Leaderboard</button>
      <button class="nav-btn" id="dashNavBtn" onclick="showPage('dashboard')">My Sadhna</button>
      <button class="nav-btn" id="adminNavBtn" onclick="showPage('admin')" style="display:none">⚙️ Admin</button>
      <button class="nav-btn gold" onclick="logout()">🚪 Logou
